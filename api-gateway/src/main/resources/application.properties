spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth-service/**,/AUTH-SERVICE/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webmvc.routes[1].id=pharmacy-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://pharmacy-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/pharmacy-service/**,/PHARMACY-SERVICE/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1